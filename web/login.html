<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧀 Сыр — войти</title>
<!-- Warm up the connections puter.js will need. -->
<link rel="preconnect" href="https://js.puter.com" crossorigin>
<link rel="preconnect" href="https://puter.com" crossorigin>
<link rel="dns-prefetch" href="https://api.puter.com">
<script src="https://js.puter.com/v2/" defer></script>
<style>
  :root {
    --cheese:    #FFC93C;
    --rind:      #E89B0E;
    --crust:     #C77912;
    --cream:     #FFF8E7;
    --choco:     #2B1810;
    --trap:      #E63946;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--choco);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  main {
    width: 100%;
    max-width: 440px;
    background: #fff;
    border: 3px solid var(--choco);
    border-radius: 18px;
    box-shadow: 8px 8px 0 var(--choco);
    padding: 28px 24px;
    text-align: center;
  }
  .mascot { font-size: 72px; line-height: 1; margin-bottom: 8px; }
  h1 { margin: 0 0 6px; font-size: 28px; letter-spacing: -0.02em; }
  .sub { margin: 0 0 20px; color: #6b5d50; font-size: 14px; }
  .msg { margin: 16px 0; font-size: 15px; line-height: 1.45; }
  .token {
    background: var(--cheese);
    color: var(--choco);
    border: 2px solid var(--choco);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    word-break: break-all;
    text-align: left;
    margin: 14px 0;
    max-height: 140px;
    overflow: auto;
    user-select: all;
    -webkit-user-select: all;
  }
  button {
    appearance: none;
    background: var(--cheese);
    color: var(--choco);
    border: 2px solid var(--choco);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--choco);
    transition: transform .08s, box-shadow .08s;
    margin-top: 6px;
  }
  button:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--choco);
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 4px solid var(--cheese);
    border-top-color: var(--choco);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 18px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err {
    background: #ffeaec;
    border: 2px solid var(--trap);
    border-radius: 10px;
    padding: 12px;
    color: var(--choco);
    font-size: 14px;
    margin: 12px 0;
  }
</style>
</head>
<body>
<main>
  <div class="mascot">🧀</div>
  <h1>Сыр</h1>
  <p class="sub">Бесплатный AI без мышеловки</p>
  <div id="content">
    <div class="spinner"></div>
    <div class="msg">Подгружаемся…</div>
  </div>
</main>

<script>
(async function () {
  const content = document.getElementById("content");

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" })[c];
    });
  }

  function showError(msg) {
    content.innerHTML =
      '<div class="err">💀 ' + escapeHtml(msg) + "</div>" +
      '<button onclick="location.reload()">Попробовать ещё</button>';
  }

  function showToken(token) {
    content.innerHTML =
      '<div class="msg">🧀 Готово. Скопируй и пришли в бот:</div>' +
      '<div class="token" id="tok"></div>' +
      '<button id="copy">Скопировать токен</button>';

    document.getElementById("tok").textContent = token;

    document.getElementById("copy").onclick = async function () {
      const btn = document.getElementById("copy");
      try {
        await navigator.clipboard.writeText(token);
        btn.textContent = "✅ Скопировано";
      } catch (e) {
        // Clipboard API unavailable (non-HTTPS or unsupported) — select text
        // so the user can long-press → Copy.
        const range = document.createRange();
        range.selectNodeContents(document.getElementById("tok"));
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        btn.textContent = "Текст выделен — Ctrl+C";
      }
    };
  }

  function showSignInButton() {
    content.innerHTML =
      '<div class="msg">Залогинься в Puter — email, Google или GitHub. ' +
      "Откроется во всплывающем окне.</div>" +
      '<button id="signin">🔑 Войти в Puter</button>';

    document.getElementById("signin").onclick = async function () {
      content.innerHTML =
        '<div class="spinner"></div>' +
        '<div class="msg">Ждём логин в открытом окне…</div>';

      try {
        const result = await puter.auth.signIn();
        const token = (result && result.token) || (window.puter && puter.authToken);
        if (token) {
          showToken(token);
        } else {
          showError("Не получили токен. Попробуй ещё раз.");
        }
      } catch (e) {
        if (e && e.error === "auth_window_closed") {
          // User dismissed the popup — let them try again.
          showSignInButton();
          return;
        }
        showError((e && (e.error || e.message)) || "Ошибка авторизации");
      }
    };
  }

  // Wait for puter.js to load (CDN).
  const start = Date.now();
  while (!window.puter || !window.puter.auth) {
    if (Date.now() - start > 10000) {
      showError("Не загрузился puter.js — проверь сеть и обнови страницу.");
      return;
    }
    await new Promise(function (r) { setTimeout(r, 50); });
  }

  // If puter.js already has a session (returning visit), hand the token
  // back immediately — no popup needed.
  if (puter.authToken) {
    showToken(puter.authToken);
    return;
  }

  showSignInButton();
})();
</script>
</body>
</html>
